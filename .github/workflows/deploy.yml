name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: arvexo-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      PORT: ${{ secrets.PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Validate deploy secrets
        run: |
          test -n "$HOST" || (echo "HOST secret is missing" && exit 1)
          test -n "$USERNAME" || (echo "USERNAME secret is missing" && exit 1)
          test -n "$PASSWORD" || (echo "PASSWORD secret is missing" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH secret is missing" && exit 1)

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".idea/" \
            --exclude ".next/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.*" \
            -e "ssh -p $PORT" \
            ./ "$USERNAME@$HOST:$DEPLOY_PATH/"

      - name: Restart application
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh -p "$PORT" "$USERNAME@$HOST" \
            "cd '$DEPLOY_PATH' && docker compose up -d --build && docker image prune -f"
